# ── Sound effects ──────────────────────────────────────────────────────────────
sfx_volume: 1.0             # master SFX multiplier (0.0 – 1.0)
eat:
  freq_start: 550           # chirp start frequency (Hz)
  freq_end:   830           # chirp end frequency (Hz)
  duration_ms: 70
  volume: 0.10
power:
  freq_base:  350           # centre frequency of sweep (Hz)
  freq_range: 350           # sweep amplitude (Hz)
  lfo_rate:   5             # sweep speed (Hz)
  duration_ms: 380
  volume: 0.12
boom:
  duration_ms: 900
  volume: 0.44
  freq_low: 36              # sub-bass tone (Hz)
  freq_mid: 82              # mid rumble tone (Hz)
  decay: 4.2                # lower = longer rumble
  noise_mix: 0.50
  crack_ms: 30              # initial sharp crack (ms)
clear:
  volume: 0.14
  notes:
    - [523, 120]   # C5
    - [659, 120]   # E5
    - [784, 120]   # G5
    - [1047, 360]  # C6
